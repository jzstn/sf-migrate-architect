<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salesforce Migration Architect | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        :root {
            --primary: #00a1e0;
            --secondary: #6c5ce7;
            --dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            background: linear-gradient(to right, #00a1e0, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: var(--glass);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--border);
        }

        .grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }

        h2 { font-size: 1.2rem; margin-bottom: 1.5rem; color: #cbd5e1; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-size: 0.85rem; margin-bottom: 0.5rem; color: #94a3b8; }
        input, select {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            padding: 0.8rem;
            border-radius: 8px;
            color: white;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; }

        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover { background: #0284c7; transform: translateY(-2px); }

        .results-area {
            display: none;
        }

        .mermaid-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            margin-top: 1rem;
            min-height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ai-block {
            background: #2d3436;
            padding: 1rem;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            position: relative;
            margin-top: 1rem;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: auto;
            padding: 0.4rem 0.8rem;
            font-size: 0.7rem;
            background: var(--secondary);
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .phase-step {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.03);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 0.8rem;
        }

        .step-num {
            background: var(--primary);
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 0.75rem; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="container">
        <header>
            <h1>Salesforce Migration Architect</h1>
            <div class="badge">v1.2 // Metadata-Driven Logic</div>
        </header>

        <div class="grid">
            <aside>
                <div class="card">
                    <h2>Mission Control</h2>
                    <div class="form-group">
                        <label>Target Salesforce Org</label>
                        <select id="loginUrl">
                            <option value="https://login.salesforce.com">Production / Developer</option>
                            <option value="https://test.salesforce.com">Sandbox</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="merlin@example.com">
                    </div>
                    <div class="form-group">
                        <label>Password + Token</label>
                        <input type="password" id="password" placeholder="••••••••••••">
                    </div>
                    <hr style="opacity: 0.1; margin: 1.5rem 0;">
                    <div class="form-group">
                        <label>Objects to Migrate</label>
                        <input type="text" id="objects" placeholder="Account, Contact, Opportunity">
                    </div>
                    <button id="btnRun">Launch Analysis</button>
                    <button id="btnDemo" style="margin-top: 0.8rem; background: var(--glass); border: 1px solid var(--border);">Run Sample Demo</button>
                </div>
            </aside>

            <main>
                <div id="results" class="results-area">
                    <div class="card" style="margin-bottom: 2rem;">
                        <h2>1. Architectural Sequence</h2>
                        <div id="sequenceList"></div>
                    </div>

                    <div class="card" style="margin-bottom: 2rem;">
                        <h2>2. Dependency Visualization</h2>
                        <div id="mermaidOutput" class="mermaid-card"></div>
                    </div>

                    <div class="card">
                        <h2>3. AI Architect Bundle</h2>
                        <div class="ai-block" id="aiPromptOutput">
                            <button class="copy-btn" id="btnCopy">Copy for AI</button>
                            <span id="aiPromptText"></span>
                        </div>
                    </div>
                </div>

                <div id="empty-state" class="card" style="height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0.5;">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                    <p style="margin-top: 1rem;">Waiting for Telemetry...</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

        const btnRun = document.getElementById('btnRun');
        const btnDemo = document.getElementById('btnDemo');
        const loader = id => document.getElementById(id);

        btnDemo.onclick = async () => {
            loader('loader').style.display = 'flex';
            const res = await fetch('/api/demo');
            const data = await res.json();
            renderResults(data);
            loader('loader').style.display = 'none';
        };

        btnRun.onclick = async () => {
            const payload = {
                username: loader('username').value,
                password: loader('password').value,
                loginUrl: loader('loginUrl').value,
                objects: loader('objects').value
            };

            if (!payload.username || !payload.password || !payload.objects) {
                alert('Please fill in all mission parameters.');
                return;
            }

            loader('loader').style.display = 'flex';
            try {
                const res = await fetch('/api/plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                renderResults(data);
            } catch (e) {
                alert('Analysis failed: ' + e.message);
            }
            loader('loader').style.display = 'none';
        };

        function renderResults(data) {
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('results').style.display = 'block';

            // 1. Sequence
            const list = document.getElementById('sequenceList');
            list.innerHTML = '';
            data.sequence.forEach((obj, i) => {
                const div = document.createElement('div');
                div.className = 'phase-step';
                div.innerHTML = `<div class="step-num">${i+1}</div> <div>${obj}</div>`;
                list.appendChild(div);
            });

            // 2. Mermaid
            const mOutput = document.getElementById('mermaidOutput');
            mOutput.innerHTML = `<pre class="mermaid">${data.mermaid}</pre>`;
            mermaid.init(undefined, ".mermaid");

            // 3. AI Bundle
            document.getElementById('aiPromptText').innerText = data.aiPrompt;
        }

        document.getElementById('btnCopy').onclick = () => {
            const text = document.getElementById('aiPromptText').innerText;
            navigator.clipboard.writeText(text);
            alert('Copied to Clipboard! Paste this into ChatGPT or Claude.');
        }
    </script>
</body>
</html>
